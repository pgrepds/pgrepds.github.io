- title: Personal Interests
  layout: text
  content: | # this will include new lines to allow paragraphs
    Research takes up most of my life. In the little time available, I am very interested in software engineering, combinatorics and group theory. Furthermore, I am a big advocate of free software and work a lot with the Julia programming language and try to extend certain Julia libraries, especially in the area of graph theory and combinatorics.
    
    I started a [blog](https://blog.pgrepds.io/) where I want to write about various different topics, but it is mainly focused on mathematics and software engineering. I participate regularly in [Project Euler](https://projecteuler.net) and I might discuss some of the problems in the future (of course without violating the competition rules).

    I was a passionate endurance athlete for a long time and still do a variety of sports, such as running, swimming and weight training. Besides that, I currently enjoy studying the philosophy of Immanuel Kant and the literature of J.R.R. Tolkien.

    Last but not least, I am also a software engineer by profession and work a lot with React, React-Native, JavaScript and Java, although I'd love to work more with Rust and Go.
